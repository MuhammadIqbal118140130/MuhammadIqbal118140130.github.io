<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" type="text/css" href="formstyle.css">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header>
        LoaK-in
    </header>
    <main>
        <div class="sidebar">
            <ul>
                <li><a class="#" href="./Index.html">Home</a></li>
                <li><a class="#" href="./Form.html">Formulir</a></li>
                <li><a class="#" href="./Table.html">Table</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="container">
                <h2>Halaman Pendaftaran</h2>
                <form id="form" method="get">
                    <div class="form-group">
                        <label for="name">Nama:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">No Handphone:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Umur:</label>
                        <input type="number" id="age" name="age" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Kelamin:</label>
                        <select id="gender" name="gender">
                            <option value="pria">Pria</option>
                            <option value="wanita">Wanita</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="stuff">Barang:</label>
                        <input type="text" id="stuff" name="stuff" required>
                    </div>
                    <div class="form-group">
                        <label for="price">Harga (rupiah):</label>
                        <input type="number" id="price" name="price" required>
                    </div>
                    <div class="form-group">
                        <label for="desc">Deskripsi:</label>
                        <input type="text" id="desc" name="desc">
                    </div>
                    <div class="form-group">
                        <label for="img">Gambar Barang:</label>
                        <input type="file" id="img" name="img">
                    </div>
                    <div class="form-group">
                        <input type="submit" value="Submit">
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer>
        &copy; 2023. <b>Muhammad Iqbal</b> All Rights Reserved.
    </footer>  
</body>
</html>
